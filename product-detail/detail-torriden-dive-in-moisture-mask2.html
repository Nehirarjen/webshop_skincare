<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Torriden Dive In Moisture Mask 2 | SUNA</title>
  <link rel="stylesheet" href="../style.css" />
  <style>
    .product-container { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; max-width: 1200px; margin: 40px auto; padding: 0 20px; }
    .product-image img { width: 100%; border-radius: 8px; }
    .price { font-size: 24px; font-weight: bold; color: #2c3e50; margin: 20px 0; }
    .order-form { background: #fff; padding: 25px; border: 2px solid #e0e0e0; border-radius: 8px; }
    .btn-order { background: #2c3e50; color: #fff; border: none; padding: 12px 30px; border-radius: 4px; width: 100%; cursor: pointer; }
    .btn-order:hover { background: #34495e; }
    .recommendations { max-width: 1200px; margin: 60px auto; padding: 0 20px; }
  </style>
</head>
<body>
  <header><nav><div class="logo">SUNA</div><a href="/webshop_skincare/index.html">Home</a></nav></header>
  <main class="container">
    <div class="product-container">
      <div class="product-image"><img src="https://torriden.us/cdn/shop/files/DIVEINMoistureMask2.jpg" alt="DIVE IN Moisture Mask 2" /></div>
      <div class="product-info">
        <h1>DIVE IN Moisture Mask 2</h1>
        <div class="brand">Marke: Torriden</div>
        <div class="price">CHF 34.00</div>
        <div class="description">Zweite Variante der Feuchtigkeitsmaske mit extra Hydration.</div>
        <div class="order-form">
          <h3>Direkt bestellen</h3>
          <form action="../order-confirmation.html" method="GET">
            <input type="hidden" name="product" value="DIVE IN Moisture Mask 2">
            <input type="hidden" name="price" value="34.00">
            <div class="form-group"><label>Name</label><input name="name" required /></div>
            <div class="form-group"><label>Email</label><input type="email" name="email" required /></div>
            <div class="form-group"><label>Adresse</label><input name="address" required /></div>
            <div class="form-group"><label>PLZ</label><input name="plz" required /></div>
            <div class="form-group"><label>Ort</label><input name="city" required /></div>
            <div class="form-group"><label>Menge</label><input type="number" name="qty" value="1" min="1" required /></div>
            <button type="submit" class="btn-order">Jetzt bestellen</button>
          </form>
        </div>
      </div>
    </div>
    <div class="recommendations"><h2>Ähnliche Produkte</h2><div class="product-grid"></div></div>
  </main>
</body>
</html>
