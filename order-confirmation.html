<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bestellbestätigung — SUNA Korean Skincare</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .order-summary{border:1px solid #e0e0e0;border-radius:8px;padding:16px;margin:16px 0;}
    table{width:100%;border-collapse:collapse}
    th,td{text-align:left;padding:8px;border-bottom:1px solid #eee}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:32px}
    @media (max-width: 800px){.two-col{grid-template-columns:1fr}}
    .badge{display:inline-block;background:#eee;border-radius:4px;padding:2px 6px;margin-right:6px}
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <nav class="nav-left">
        <a href="products.html">Produkte</a>
        <a href="brands.html">Marken</a>
        <a href="contact.html">Kontakt</a>
      </nav>
      <a href="index.html" class="logo">SUNA</a>
      <div class="nav-right"><span class="tagline">Korean Skincare</span></div>
    </div>
  </header>
  <main class="container">
    <h1>Bestellbestätigung</h1>
    <p>Vielen Dank für Ihre Bestellung!</p>

    <section class="order-summary" aria-label="Bestelldetails">
      <table id="order-table" aria-label="Bestellübersicht">
        <tr><th>Produkt</th><td id="pname">-</td></tr>
        <tr><th>Preis</th><td id="pprice">-</td></tr>
        <tr><th>Name</th><td id="pname-user">-</td></tr>
        <tr><th>E-Mail</th><td id="pemail">-</td></tr>
        <tr><th>Adresse</th><td id="paddress">-</td></tr>
        <tr><th>PLZ</th><td id="plz">-</td></tr>
        <tr><th>Ort</th><td id="pcity">-</td></tr>
        <tr><th>Menge</th><td id="pqty">-</td></tr>
      </table>
    </section>

    <p>Wenn eine Angabe fehlt, überprüfen Sie bitte Ihre Eingaben im zurückgelassenen Formular.</p>
  </main>
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand"><span class="logo">SUNA</span><p>Kuratiertes K-Beauty aus Seoul — die Schweiz.</p></div>
    </div>
  </footer>
  <script>
    // Very small JS to render GET params (name, email, address, etc.) into the page
    function q(name){ const s = new URLSearchParams(window.location.search); return s.get(name) || ''; }
    const product = q('product');
    const price = q('price');
    const name = q('name');
    const email = q('email');
    const address = q('address');
    const plz = q('plz');
    const city = q('city');
    const qty = q('qty');
    if(product){ document.getElementById('pname').textContent = product; }
    if(price){ document.getElementById('pprice').textContent = price; }
    if(name){ document.getElementById('pname-user').textContent = name; }
    if(email){ document.getElementById('pemail').textContent = email; }
    if(address){ document.getElementById('paddress').textContent = address; }
    if(plz){ document.getElementById('plz').textContent = plz; }
    if(city){ document.getElementById('pcity').textContent = city; }
    if(qty){ document.getElementById('pqty').textContent = qty; }
  </script>
</body>
</html>
